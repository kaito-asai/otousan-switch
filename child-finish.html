<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おとうさんスイッチ — 送ったよ！</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --sky:#eaf4fd; --blue:#2b7fc2; --blue-dark:#1a5c94; --blue-light:#5ba3d9;
  --navy:#0f3a5c; --white:#ffffff; --text:#1a2e40; --text-soft:#5a7a96;
  --border:rgba(43,127,194,0.18); --shadow:rgba(43,127,194,0.1); --gold:#e6a800; --green:#27ae60;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--sky); font-family:'Noto Sans JP',sans-serif;
  min-height:100vh; color:var(--text);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
body::before {
  content:''; position:fixed; inset:0;
  background:
    radial-gradient(ellipse 300px 100px at 10% 8%,rgba(255,255,255,0.8) 0%,transparent 70%),
    radial-gradient(ellipse 220px 75px at 82% 4%,rgba(255,255,255,0.65) 0%,transparent 70%),
    radial-gradient(ellipse 180px 60px at 50% 22%,rgba(255,255,255,0.4) 0%,transparent 70%),
    linear-gradient(180deg,#cce4f7 0%,#deeefa 30%,#eaf4fd 65%,#f3f9ff 100%);
  pointer-events:none; z-index:0;
}

.page {
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center;
  text-align:center; padding:52px 24px 60px;
  max-width:480px; width:100%;
}

/* Sent orb */
.sent-orb {
  width:108px; height:108px; border-radius:50%;
  background:linear-gradient(135deg,var(--blue-light),var(--blue));
  display:flex; align-items:center; justify-content:center;
  font-size:46px; margin:0 auto 36px;
  box-shadow:0 10px 36px rgba(43,127,194,0.35), inset 0 3px 8px rgba(255,255,255,0.25);
  animation:bounceIn 0.55s cubic-bezier(0.36,0.07,0.19,0.97) both;
  position:relative;
}
.sent-orb::after {
  content:''; position:absolute; inset:-10px; border-radius:50%;
  border:2px solid rgba(43,127,194,0.15);
  animation:ringFade 0.6s ease 0.4s both;
}
@keyframes bounceIn {
  0%{transform:scale(0);opacity:0} 60%{transform:scale(1.16)} 100%{transform:scale(1);opacity:1}
}
@keyframes ringFade {
  from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)}
}

.finish-h {
  font-family:'Yomogi',cursive;
  font-size:clamp(28px,8vw,38px);
  color:var(--blue-dark); line-height:1.3;
  margin-bottom:14px;
  animation:fadeUp 0.45s ease 0.2s both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.finish-desc {
  font-size:14px; color:var(--text-soft);
  line-height:2.15; max-width:290px;
  margin:0 auto 40px; font-weight:300;
  animation:fadeUp 0.45s ease 0.35s both;
}

/* TIMELINE */
.timeline {
  text-align:left; width:100%; max-width:350px;
  margin:0 auto 40px;
  background:var(--white); border-radius:16px;
  padding:24px; box-shadow:0 4px 20px var(--shadow);
  border:2px solid var(--border);
  animation:fadeUp 0.45s ease 0.5s both;
}
.tl-item {
  display:flex; gap:16px; padding:12px 0;
  border-bottom:1px solid rgba(43,127,194,0.07);
}
.tl-item:last-child { border-bottom:none; padding-bottom:0; }
.tl-dot {
  width:11px; height:11px; border-radius:50%;
  background:rgba(43,127,194,0.18); margin-top:4px; flex-shrink:0;
}
.tl-item.done .tl-dot { background:var(--blue); box-shadow:0 0 7px rgba(43,127,194,0.5); }
.tl-item.soon .tl-dot { background:var(--gold); box-shadow:0 0 6px rgba(230,168,0,0.45); }
.tl-time { font-size:11px; color:var(--text-soft); margin-bottom:3px; font-weight:500; }
.tl-event { font-size:13px; color:var(--text); line-height:1.65; }
.tl-item.done .tl-event { color:var(--blue-dark); font-weight:700; }

/* Button */
.btn-top {
  background:linear-gradient(135deg,var(--blue),var(--blue-dark));
  color:white; border:none; padding:18px 52px;
  font-family:'Noto Sans JP',sans-serif;
  font-size:15px; font-weight:700; border-radius:50px;
  cursor:pointer; box-shadow:0 6px 20px rgba(43,127,194,0.38);
  transition:all 0.2s; letter-spacing:0.08em;
  animation:fadeUp 0.45s ease 0.65s both;
}
.btn-top:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(43,127,194,0.48); }

/* CONFETTI */
.cfwrap { position:fixed; inset:0; pointer-events:none; z-index:9998; }
.cp { position:absolute; top:-10px; animation:fall linear forwards; }
@keyframes fall { to{transform:translateY(110vh) rotate(720deg);opacity:0;} }
</style>
</head>
<body>

<div class="page">
  <div class="sent-orb">📮</div>

  <h1 class="finish-h">送ったよ！</h1>

  <p class="finish-desc">
    父の日当日、お父さんにこっそり届くよ。<br><br>
    最後のスイッチ「はなす」を<br>
    お父さんが押したら、<br>
    自分から会いに行こう！
  </p>

  <div class="timeline">
    <div class="tl-item done">
      <div class="tl-dot"></div>
      <div><div class="tl-time">今日</div><div class="tl-event">スイッチを作って送った ✓</div></div>
    </div>
    <div class="tl-item soon">
      <div class="tl-dot"></div>
      <div><div class="tl-time" id="tl-date">父の日当日</div><div class="tl-event">お父さんに通知が届く</div></div>
    </div>
    <div class="tl-item">
      <div class="tl-dot"></div>
      <div><div class="tl-time">その後</div><div class="tl-event">お父さんがスイッチを楽しむ</div></div>
    </div>
    <div class="tl-item">
      <div class="tl-dot"></div>
      <div><div class="tl-time">最後</div><div class="tl-event">「はなす」→ 自分から会いに行く 💬</div></div>
    </div>
  </div>

  <button class="btn-top" onclick="window.location.href='child-form.html'">トップにもどる</button>
</div>

<div class="cfwrap" id="cfwrap"></div>

<script>
// Read date from sessionStorage then clean up
try {
  const data = JSON.parse(sessionStorage.getItem('otousan_data') || 'null');
  if (data && data.date) {
    const fmt = new Date(data.date).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
    document.getElementById('tl-date').textContent = fmt;
  }
  sessionStorage.removeItem('otousan_data');
} catch(e) {}

// Auto-launch confetti
(function confetti() {
  const c = document.getElementById('cfwrap');
  const cols = ['#2b7fc2','#5ba3d9','#e6a800','#27ae60','#ffffff','#cce4f7','#f0c040'];
  for (let i = 0; i < 78; i++) {
    const p = document.createElement('div');
    p.className = 'cp';
    p.style.cssText = `left:${Math.random()*100}%;background:${cols[~~(Math.random()*cols.length)]};animation-duration:${1.5+Math.random()*2.2}s;animation-delay:${Math.random()*0.7}s;width:${6+Math.random()*9}px;height:${6+Math.random()*9}px;border-radius:${Math.random()>.5?'50%':'2px'};transform:rotate(${Math.random()*360}deg);`;
    c.appendChild(p);
  }
  setTimeout(() => c.innerHTML = '', 5000);
})();
</script>
</body>
</html>
