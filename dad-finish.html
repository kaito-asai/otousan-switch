<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おとうさんスイッチ — 全部押したよ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --sky: #eef6fd;
  --blue: #2b7fc2;
  --blue-dark: #1a5c94;
  --blue-light: #5ba3d9;
  --navy: #0f3a5c;
  --white: #ffffff;
  --text: #1a2e40;
  --text-soft: #5a7a96;
  --border: rgba(43,127,194,0.15);
  --shadow: rgba(43,127,194,0.1);
  --gold: #e6a800;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--sky);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 320px 110px at 10% 10%, rgba(255,255,255,0.8) 0%, transparent 70%),
    radial-gradient(ellipse 240px 80px at 85% 5%, rgba(255,255,255,0.65) 0%, transparent 70%),
    radial-gradient(ellipse 200px 70px at 50% 30%, rgba(255,255,255,0.4) 0%, transparent 70%),
    linear-gradient(180deg, #cce4f7 0%, #deeefa 30%, #eef6fd 65%, #f5faff 100%);
  pointer-events: none; z-index: 0;
}

.page {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 52px 28px 60px;
  max-width: 480px;
  width: 100%;
}

/* Completed orb */
.done-orb {
  width: 110px; height: 110px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ddeefa, #b8d8f2);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 36px;
  box-shadow: 0 10px 36px rgba(43,127,194,0.25), inset 0 3px 8px rgba(255,255,255,0.85);
  animation: bounceIn 0.6s cubic-bezier(0.36,0.07,0.19,0.97) both;
  position: relative;
}
.done-orb::after {
  content: '';
  position: absolute; inset: -10px;
  border-radius: 50%;
  border: 2px solid rgba(43,127,194,0.12);
  animation: ringFade 1s ease 0.5s both;
}
@keyframes bounceIn {
  0%   { transform: scale(0); opacity: 0; }
  60%  { transform: scale(1.16); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes ringFade {
  from { opacity: 0; transform: scale(0.8); }
  to   { opacity: 1; transform: scale(1); }
}
.done-orb-inner {
  font-size: 48px;
  animation: popIn 0.4s cubic-bezier(0.36,0.07,0.19,0.97) 0.2s both;
}
@keyframes popIn {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

/* Heading */
.finish-h {
  font-family: 'Yomogi', cursive;
  font-size: clamp(28px, 8vw, 40px);
  color: var(--blue-dark);
  line-height: 1.35;
  margin-bottom: 20px;
  animation: fadeUp 0.5s ease 0.3s both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Body text */
.finish-body {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  line-height: 2.3;
  color: var(--text-soft);
  font-weight: 300;
  max-width: 300px;
  margin: 0 auto 44px;
  animation: fadeUp 0.5s ease 0.45s both;
}

/* Card */
.finish-card {
  background: var(--white);
  border: 2px solid var(--border);
  border-radius: 18px;
  padding: 30px 32px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 4px 24px var(--shadow);
  margin-bottom: 40px;
  animation: fadeUp 0.5s ease 0.6s both;
}
.card-eyebrow {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.2em; color: var(--blue);
  margin-bottom: 14px;
}
.card-body {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; color: var(--navy);
  line-height: 2.1; font-weight: 400;
}

/* Divider with dots */
.dot-row {
  display: flex; gap: 10px;
  justify-content: center;
  margin: 6px 0 20px;
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(43,127,194,0.25);
}
.dot.lit { background: var(--blue); box-shadow: 0 0 6px rgba(43,127,194,0.45); }

/* Back link */
.back-link {
  background: none; border: 2px solid var(--border);
  color: var(--text-soft);
  padding: 13px 38px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  border-radius: 50px; cursor: pointer;
  transition: all 0.2s;
  animation: fadeUp 0.5s ease 0.75s both;
}
.back-link:hover { border-color: var(--blue-light); color: var(--blue-dark); }

/* confetti */
.cfwrap { position: fixed; inset: 0; pointer-events: none; z-index: 9998; }
.cp { position: absolute; top: -10px; animation: fall linear forwards; }
@keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>

<div class="page">

  <div class="done-orb">
    <div class="done-orb-inner">🌤️</div>
  </div>

  <h1 class="finish-h">全部のスイッチ、<br>押しました</h1>

  <p class="finish-body">
    最後は「はなす」でしたね。<br><br>
    誰かが、あなたのために<br>
    このスイッチを作ってくれました。<br><br>
    ちょっと、連絡してみませんか。
  </p>

  <button class="back-link" onclick="window.location.href='dad-top.html'">
    最初からみる
  </button>

</div>

<div class="cfwrap" id="cfwrap"></div>

<script>
// Auto-launch confetti on arrival
(function confetti() {
  const c = document.getElementById('cfwrap');
  const cols = ['#2b7fc2','#5ba3d9','#e6a800','#27ae60','#ffffff','#cce4f7','#f0c040'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'cp';
    p.style.cssText = `left:${Math.random()*100}%;background:${cols[~~(Math.random()*cols.length)]};animation-duration:${1.6+Math.random()*2.2}s;animation-delay:${Math.random()*0.8}s;width:${6+Math.random()*9}px;height:${6+Math.random()*9}px;border-radius:${Math.random()>.5?'50%':'2px'};transform:rotate(${Math.random()*360}deg);`;
    c.appendChild(p);
  }
  setTimeout(() => c.innerHTML = '', 5000);
})();
</script>
</body>
</html>
