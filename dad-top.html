<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おとうさんスイッチ — 届いたよ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --sky: #eef6fd;
  --blue: #2b7fc2;
  --blue-dark: #1a5c94;
  --blue-light: #5ba3d9;
  --navy: #0f3a5c;
  --white: #ffffff;
  --text: #1a2e40;
  --text-soft: #5a7a96;
  --border: rgba(43,127,194,0.15);
  --shadow: rgba(43,127,194,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--sky);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  color: var(--text);
  display: flex;
  flex-direction: column;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 300px 100px at 12% 8%, rgba(255,255,255,0.78) 0%, transparent 70%),
    radial-gradient(ellipse 240px 80px at 82% 4%, rgba(255,255,255,0.65) 0%, transparent 70%),
    radial-gradient(ellipse 180px 60px at 50% 20%, rgba(255,255,255,0.45) 0%, transparent 70%),
    linear-gradient(180deg, #cce4f7 0%, #deeefa 30%, #eef6fd 65%, #f5faff 100%);
  pointer-events: none;
  z-index: 0;
}

/* NOTIF BAR — mimics a phone notification */
.notif-bar {
  position: relative; z-index: 1;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(43,127,194,0.12);
  padding: 11px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 1px 10px var(--shadow);
  flex-shrink: 0;
}
.notif-app-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--blue-light), var(--blue-dark));
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  box-shadow: 0 2px 7px rgba(43,127,194,0.3);
  flex-shrink: 0;
}
.notif-app-name {
  font-family: 'Yomogi', cursive;
  font-size: 15px;
  color: var(--navy);
}
.notif-time {
  font-size: 11px; color: var(--text-soft); margin-left: auto;
}

/* MAIN CONTENT */
.hero {
  position: relative; z-index: 1;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 52px 28px 60px;
  text-align: center;
  max-width: 500px;
  margin: 0 auto;
  width: 100%;
}

/* Animated switch orb */
.orb-wrap {
  position: relative;
  width: 140px; height: 140px;
  margin: 0 auto 40px;
}
.orb-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 2px solid rgba(43,127,194,0.18);
  animation: ringPulse 3s ease-in-out infinite;
}
.orb-ring2 {
  position: absolute; inset: -12px;
  border-radius: 50%;
  border: 1.5px solid rgba(43,127,194,0.08);
  animation: ringPulse 3s ease-in-out infinite 0.6s;
}
@keyframes ringPulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.06); opacity: 0.6; }
}
.orb {
  position: absolute; inset: 0;
  border-radius: 50%;
  background: linear-gradient(145deg, #ddeefa 0%, #b8d8f2 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 10px 36px rgba(43,127,194,0.22), inset 0 3px 8px rgba(255,255,255,0.85);
  animation: float 4s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-9px); }
}
.orb-knob {
  width: 82px; height: 82px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 28%, var(--blue-light), var(--blue-dark));
  box-shadow: 0 5px 18px rgba(43,127,194,0.55);
  animation: glow 2.8s ease-in-out infinite;
}
@keyframes glow {
  0%,100% { box-shadow: 0 5px 18px rgba(43,127,194,0.45); }
  50%      { box-shadow: 0 5px 32px rgba(43,127,194,0.72), 0 0 0 8px rgba(43,127,194,0.09); }
}

/* Title */
.hero-title {
  font-family: 'Yomogi', cursive;
  font-size: clamp(42px, 11vw, 76px);
  color: var(--blue-dark);
  line-height: 1.18;
  margin-bottom: 14px;
  text-shadow: 2px 3px 0 rgba(255,255,255,0.85), 0 4px 24px rgba(43,127,194,0.12);
  letter-spacing: 0.03em;
}

.hero-body {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  line-height: 2.2;
  color: var(--text-soft);
  font-weight: 300;
  max-width: 290px;
  margin: 0 auto 32px;
}

/* Mystery tag */
.mystery-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(43,127,194,0.06);
  border: 1.5px dashed rgba(43,127,194,0.28);
  border-radius: 30px;
  padding: 10px 24px;
  font-size: 13px;
  color: var(--text-soft);
  margin-bottom: 40px;
  font-weight: 300;
  font-family: 'Noto Sans JP', sans-serif;
}

/* CTA button */
.btn-open {
  background: linear-gradient(135deg, var(--blue), var(--blue-dark));
  color: white; border: none;
  padding: 20px 58px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 17px; font-weight: 700;
  border-radius: 50px; cursor: pointer;
  box-shadow: 0 7px 22px rgba(43,127,194,0.42);
  transition: all 0.2s;
  letter-spacing: 0.09em;
}
.btn-open:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(43,127,194,0.52); }
.btn-open:active { transform: translateY(0); }

/* small hint below button */
.hint-below {
  margin-top: 16px;
  font-size: 12px;
  color: rgba(90,122,150,0.55);
  font-weight: 300;
}
</style>
</head>
<body>

<div class="notif-bar">
  <div class="notif-app-icon">🔵</div>
  <div class="notif-app-name">おとうさんスイッチ</div>
</div>

<div class="hero">
  <div class="orb-wrap">
    <div class="orb-ring2"></div>
    <div class="orb-ring"></div>
    <div class="orb"><div class="orb-knob"></div></div>
  </div>

  <h1 class="hero-title">おとうさん<br>スイッチが<br>届いたよ</h1>

  <p class="hero-body">
    今日、あなたのために<br>
    ５つのスイッチが届いています。<br><br>
    誰が送ったかは、まだ秘密。<br>
    ひとつずつ押してみてください。
  </p>

  <div class="mystery-tag">🔒 送り主は、まだわからない</div>

  <button class="btn-open" onclick="window.location.href='dad-switches.html'">
    スイッチを開く
  </button>
  <div class="hint-below">上から順番に押してね</div>
</div>

</body>
</html>
